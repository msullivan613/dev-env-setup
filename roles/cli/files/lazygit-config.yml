autoFetch: false
git:
    pagers:
        - pager: delta --dark --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
os:
    edit: "micro {{filename}}"
    editAtLine: "micro -parsecursor true {{filename}}:{{line}}:0"
    editInTerminal: true
    open: "micro {{filename}}"
    
