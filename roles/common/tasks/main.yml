---
- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade installed packages
  become: true
  ansible.builtin.apt:
    upgrade: dist

- name: Install base packages
  become: true
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
