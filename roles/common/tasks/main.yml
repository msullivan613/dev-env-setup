---
- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade installed packages
  become: true
  ansible.builtin.apt:
    upgrade: dist

- name: Install base packages
  become: true
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Add user to the sudo group
  become: true
  ansible.builtin.user:
    name: "{{ target_user }}"
    groups: sudo
    append: true
  when: sudo_grant | bool

- name: Grant passwordless sudo
  become: true
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-{{ target_user }}-nopasswd"
    content: "{{ target_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  when: sudo_nopasswd | bool
